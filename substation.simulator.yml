services:
  simulator:
    build:
      context: .
      dockerfile: Dockerfile.circuit_simulator
    hostname: simulator
    volumes:
      - ./scd:/srv/scd
    networks:
      subnetwork1:
        ipv4_address: 10.0.0.254
    privileged: true
    ports:
      - "5010:5010"
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined

  client:
    build:
      context: ../iec61850_arm_honeypot
      dockerfile: Dockerfile.libiec61850_client
    hostname: client
    networks:
      subnetwork1:
        ipv4_address: 10.0.0.11
    privileged: true
    ports:
      - "5000:5000"

  attacker:
    build:
      context: .
      dockerfile: Dockerfile.attacker
    hostname: attacker
    networks:
      subnetwork1:
        ipv4_address: 10.0.0.66
    privileged: true
    volumes:
      - ./tests:/tests
